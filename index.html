<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ROCKET TWEAKS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            text-align: center;
        }

        header {
            padding: 80px 20px;
        }

        h1 {
            font-size: 56px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
        }

        .prices {
            margin-top: 40px;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            width: 300px;
            margin: 15px auto;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: #00d4ff;
            box-shadow: 0 0 15px #00d4ff;
        }

        .price {
            font-size: 22px;
            margin: 10px 0;
        }

        .discord-box {
            margin-top: 60px;
            padding: 30px;
            background: #111;
            border-radius: 15px;
            display: inline-block;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .discord-box:hover {
            border-color: #5865F2;
            box-shadow: 0 0 15px #5865F2;
        }

        a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 22px;
        }

        a:hover {
            text-decoration: underline;
        }

        /* CONTACT SECTION */
        .contact {
            margin-top: 70px;
            padding: 40px;
            background: #111;
            border-top: 1px solid #333;
        }

        .contact h2 {
            font-size: 32px;
            color: #00d4ff;
            text-shadow: 0 0 8px #00d4ff;
        }

        .contact p {
            font-size: 22px;
            margin-top: 10px;
        }

        .discord-user {
            font-size: 26px;
            color: #5865F2;
            text-shadow: 0 0 8px #5865F2;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <header>
        <h1>ROCKETOPTIMIZER-ELITEPACKS</h1>
    </header>

    <section class="prices">
        <div class="card">
            <div class="price">Optimización 0 Delay — 5$</div>
        </div>

        <div class="card">
            <div class="price">Optimización ElitePack — 10$</div>
        </div>

        <div class="card">
            <div class="price">Optimización ElitePack-Plus — 15$</div>
        </div>
    </section>

    <div class="discord-box">
        <p style="font-size: 22px;">Canal de Discord Rocket Optimizer</p>
        <a href="https://discord.gg/7FH994Ax" target="_blank">Entrar al Discord</a>
    </div>

    <section class="contact">
        <h2>Contacto</h2>
        <p>Para soporte o encargos, contáctame en Discord:</p>
        <p class="discord-user">mbg_rockettt</p>
    </section>

</body>
</html>
